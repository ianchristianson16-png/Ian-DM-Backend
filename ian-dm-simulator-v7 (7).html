<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ian — DM Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080809;--s1:#111113;--s2:#18181b;--s3:#222226;--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.18);--text:#ededea;--muted:#66665f;--soft:#999992;--acc:#d4f04c;--acc-dim:#1e2408;--acc-text:#c8e832;--acc2:#4cf0a8;--acc2-dim:#042418;--acc2-text:#3de09a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;border-bottom:1px solid var(--b1);flex-shrink:0;gap:12px;background:var(--s1);}
.t-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--acc);letter-spacing:0.04em;}
.t-sep{width:1px;height:16px;background:var(--b2);}
.t-sub{font-size:12px;color:var(--muted);}
.t-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.fw{display:flex;align-items:center;gap:7px;}
.fl{font-family:'Syne',sans-serif;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:0.1em;white-space:nowrap;text-transform:uppercase;}
.fi{background:var(--s2);border:1px solid var(--b2);border-radius:7px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:11px;padding:5px 10px;outline:none;transition:border-color 0.15s;}
.fi:focus{border-color:var(--b3);}
.fi::placeholder{color:var(--muted);}
#apiKey{width:210px;}
.cal-status{display:flex;align-items:center;gap:6px;}
.cal-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s;}
.cal-dot.live{background:var(--acc2);}
.cal-text{font-size:11px;color:var(--muted);transition:color 0.3s;}
.cal-text.live{color:var(--acc2-text);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:170px;flex-shrink:0;border-right:1px solid var(--b1);background:var(--s1);display:flex;flex-direction:column;padding:18px 0 14px;}
.sb-lbl{font-family:'Syne',sans-serif;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;padding:0 16px 10px;}
.stage{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:12px;color:var(--muted);transition:color 0.15s;position:relative;}
.stage.active{color:var(--acc-text);}
.stage.done{color:var(--acc2-text);}
.sn{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;width:19px;height:19px;border-radius:50%;border:1px solid var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;color:var(--muted);}
.stage.active .sn{border-color:var(--acc);background:var(--acc-dim);color:var(--acc-text);}
.stage.done .sn{border-color:var(--acc2);background:var(--acc2-dim);color:var(--acc2-text);}
.stage.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--acc);border-radius:0 2px 2px 0;}
.sb-bot{margin-top:auto;padding:0 12px;display:flex;flex-direction:column;gap:8px;}
.reset-btn{width:100%;padding:7px;background:transparent;border:1px solid var(--b2);border-radius:7px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:color 0.15s,border-color 0.15s;}
.reset-btn:hover{color:var(--text);border-color:var(--b3);}
.booked-count{font-family:'Syne',sans-serif;font-size:10px;color:var(--muted);text-align:center;padding:4px 0;}
.booked-count span{color:var(--acc2-text);font-weight:600;}
.chat{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-head{padding:11px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--s1);}
.ch-l{display:flex;align-items:center;gap:11px;}
.av{width:32px;height:32px;border-radius:50%;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--soft);flex-shrink:0;transition:all 0.2s;}
.av.live{border-color:var(--b3);color:var(--text);}
.ch-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;}
.ch-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.stag{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;padding:4px 10px;border-radius:999px;letter-spacing:0.03em;background:var(--acc-dim);color:var(--acc-text);border:1px solid rgba(212,240,76,0.18);}
.msgs{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:3px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
.msg{max-width:70%;padding:9px 13px;font-size:13.5px;line-height:1.56;animation:pop 0.17s cubic-bezier(0.34,1.3,0.64,1);}
@keyframes pop{from{opacity:0;transform:scale(0.93) translateY(5px);}to{opacity:1;transform:scale(1) translateY(0);}}
.msg-them{align-self:flex-start;background:var(--s2);color:var(--text);border-radius:14px 14px 14px 3px;border:1px solid var(--b1);}
.msg-me{align-self:flex-end;background:var(--acc);color:#0a0a0b;border-radius:14px 14px 3px 14px;font-weight:500;}
.msg-sys{align-self:center;background:transparent;color:var(--muted);font-size:11px;font-family:'Syne',sans-serif;border:1px solid var(--b1);border-radius:999px;padding:4px 14px;text-align:center;max-width:88%;margin:5px 0;}
.msg-booked{align-self:center;background:var(--acc2-dim);color:var(--acc2-text);font-size:11px;font-family:'Syne',sans-serif;border:1px solid rgba(76,240,168,0.2);border-radius:999px;padding:5px 16px;text-align:center;max-width:92%;margin:6px 0;animation:pop 0.2s ease;}
.gap{height:9px;flex-shrink:0;}
.typer{align-self:flex-end;background:var(--s3);border:1px solid var(--b2);border-radius:14px 14px 3px 14px;padding:10px 14px;display:flex;gap:4px;align-items:center;}
.typer span{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:pulse 1.1s infinite;}
.typer span:nth-child(2){animation-delay:0.18s;}
.typer span:nth-child(3){animation-delay:0.36s;}
@keyframes pulse{0%,80%,100%{opacity:0.15;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
.hints{padding:8px 18px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--b1);flex-shrink:0;}
.hl{font-family:'Syne',sans-serif;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.hint{font-size:11px;padding:4px 11px;border-radius:999px;border:1px solid var(--b2);color:var(--soft);cursor:pointer;background:transparent;font-family:'Instrument Sans',sans-serif;transition:all 0.12s;}
.hint:hover{border-color:var(--acc);color:var(--acc-text);background:var(--acc-dim);}
.input-row{padding:12px 18px;display:flex;gap:10px;align-items:flex-end;border-top:1px solid var(--b1);flex-shrink:0;background:var(--s1);}
.ibox{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:9px 13px;font-size:13.5px;font-family:'Instrument Sans',sans-serif;color:var(--text);resize:none;min-height:40px;max-height:110px;outline:none;transition:border-color 0.15s;}
.ibox:focus{border-color:var(--b3);}
.ibox::placeholder{color:var(--muted);}
.sbtn{background:var(--acc);color:#0a0a0b;border:none;border-radius:10px;padding:0 20px;font-size:12px;font-weight:600;cursor:pointer;height:40px;font-family:'Syne',sans-serif;letter-spacing:0.03em;transition:opacity 0.15s,transform 0.1s;flex-shrink:0;}
.sbtn:hover{opacity:0.87;}
.sbtn:active{transform:scale(0.97);}
.sbtn:disabled{opacity:0.28;cursor:not-allowed;}
</style>
</head>
<body>
<div class="topbar">
  <div class="t-left"><span class="logo">IAN.DM</span><div class="t-sep"></div><span class="t-sub">booking flow simulator</span></div>
  <div class="t-right">
    <div class="cal-status"><div class="cal-dot" id="calDot"></div><span class="cal-text" id="calText">loading...</span></div>
    <div class="t-sep"></div>
    <div class="fw"><span class="fl">API Key</span><input class="fi" id="apiKey" type="password" placeholder="sk-ant-api03-..." /></div>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-lbl">Flow</div>
    <div id="stageList"></div>
    <div class="sb-bot">
      <div class="booked-count">calls booked: <span id="bookedCount">0</span></div>
      <button class="reset-btn" onclick="resetChat()">reset conversation</button>
    </div>
  </div>
  <div class="chat">
    <div class="chat-head">
      <div class="ch-l">
        <div class="av" id="av">?</div>
        <div><div class="ch-name" id="chName">Lead</div><div class="ch-sub">you are playing this person</div></div>
      </div>
      <div class="stag" id="stag">stage 1 / open</div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="hints" id="hints"><span class="hl">try</span></div>
    <div class="input-row">
      <textarea class="ibox" id="inp" placeholder="Type what the lead would say..." rows="1" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="go()">Send</button>
    </div>
  </div>
</div>
<script>
const BACKEND='https://ian-dm-backend-production.up.railway.app';
const STAGES=[{id:1,label:"Open"},{id:2,label:"Validate + goal"},{id:3,label:"Find the block"},{id:4,label:"Future pace"},{id:5,label:"Pitch call"},{id:6,label:"Schedule"},{id:7,label:"Confirm"}];
const HINTS=[["Hey I saw your content and reached out",1],["I really struggle with confidence around people",2],["Fear of rejection honestly",3],["I'd miss out on that job promotion lol",4],["Yeah I'm down for a call",5],["Tomorrow 3pm works, I'm PST",6],["I don't have money right now",5],["Can we reschedule?",7]];

let msgs=[],stg=1,busy=false,lname="Lead",lastMsg="",calData="",nowData=null,bookedTotal=0,convId=null,lastStg=1;

function buildSys(){
  const todayStr = nowData ? nowData.now : 'unknown';

  // Build an explicit date reference table so AI never has to calculate
  let dateRef = '';
  if(nowData && nowData.nextDays){
    dateRef = '\n\nEXACT DATE LOOKUP TABLE (use this directly, do not calculate):\n';
    nowData.nextDays.forEach(d => {
      dateRef += `${d.label} = ${d.weekday} ${d.display} = ISO date ${d.date}\n`;
    });
    dateRef += '\nWhen someone says "Monday" or "tomorrow" etc, look up the ISO date directly from this table. Do not calculate. Copy the date string exactly.';
  }

  return`You are roleplaying as Ian, a 19-year-old entrepreneur, model, and social media personality based in San Diego. You coach people on communication, confidence, and social skills. You DM people who follow your content to book short strategy calls.

TODAY (PST): ${todayStr}
${dateRef}

VOICE AND PERSONALITY:
- Lowercase always. Text like a real person, not a coach or a bot.
- You are genuinely witty. Quick, playful humor deployed naturally.
- You toy with people in a friendly way. You banter. You're not just nodding and asking questions.
- When someone says something funny or self-aware, actually respond to it before moving on.
- Examples of how you respond to funny moments:
  * "i'd miss out on that job promotion lol" -> "ayyy atta boy" or "okay so the motivation IS there haha"
  * "i'm terrible at talking to people" -> "bold of you to admit that" or "okay first step is awareness haha"
  * "i don't know why i'm like this" -> "honestly that's more self aware than most people get"
  * "lol yeah" -> "haha yeah exactly" or match their energy, don't just say "great"
- You have a confident, warm energy. Not trying to impress anyone.
- You're genuinely interested in people but you don't perform it.
- Zero emojis. Hard rule.
- Zero hyphens or dashes. Hard rule. Use a comma instead.
- No messages over 15 words per chunk.

FORMAT: Split every response into 2-4 chunks using pipe | separator.
Good: "ayyy atta boy|so the drive is there|what's actually stopping you from going for it"
Good: "haha okay fair|but real talk|what would you be missing out on if you didn't fix this"
Bad: one long paragraph

NEVER: empathy speeches, adjective lists to describe the person, coach speak, hyphens, dashes, emojis, re-pitching after a no.

HUMOR: if person sends same message twice: "haha you sent that twice" then keep going. Catch contradictions. Match self-deprecating energy lightly.

7-STEP BOOKING FLOW:
Step 1 OPEN: "are there any specific situations you'd like my commentary on|would love to help you out"
Step 2 VALIDATE + GOAL: Brief validation. Ask their end goal. Play with the moment if it's funny.
Step 3 FIND THE BLOCK: "gotta love it|what's actually holding you back from getting there though"
Step 4 FUTURE PACE: Make them feel the cost of not fixing it. Respond to humor naturally.
Step 5 PITCH: "honestly i know exactly how we solve this|short strategy call|you in"
Step 6 SCHEDULE: Ask what works and their timezone. Before suggesting OR confirming any time, check it against Ian's busy blocks below. If the lead suggests a conflicting time, tell them it doesn't work and offer the nearest open slot. NEVER confirm a time that overlaps a busy block. Busy blocks are hard walls.
Step 7 CONFIRM + BOOK: Confirm messages then on a NEW LINE output exactly:
BOOK:{"dateTime":"YYYY-MM-DDTHH:MM:SS","timezone":"IANA_TIMEZONE","situation":"situation in 8 words max"}

BOOKING RULES:
- Use the DATE LOOKUP TABLE above. Copy the ISO date directly. Do not add 1. Do not calculate.
- dateTime is the lead's LOCAL time. If they say "Monday 3pm PST" copy Monday's ISO date from the table and use T15:00:00.
- IANA timezones: America/Los_Angeles (PST/Seattle/LA), America/New_York (EST), America/Chicago (CST), America/Denver (MST)
- Only output BOOK at step 7 after a specific time is confirmed.
- CONFLICT CHECK: Before outputting BOOK, verify the time does not overlap any busy block. If it does, do not output BOOK — go back and reschedule.

Ian's busy calendar blocks (PST) — DO NOT book during these times:
${calData||'Calendar not loaded'}

EDGE CASES:
- Declines: "all good" nothing more
- No money: "all good|stack that bread and we'll talk|free stuff on my page in the meantime"
- Why free: jump to step 7 expectations
- Reschedule: "you're good|does X work"
- Qualification doubt: "real talk|do you have the time money and energy to invest in yourself right now"

ALWAYS: pipe | between chunks. Min 2. Max 4. Short chunks.`;
}

async function loadData(){
  try{
    const r=await fetch(BACKEND+'/now');
    nowData=await r.json();
    console.log('Now data:', JSON.stringify(nowData));
  }catch(e){
    console.error('Failed to load now:', e);
  }
  try{
    const r=await fetch(BACKEND+'/availability');
    const d=await r.json();
    if(d.availability&&!d.availability.startsWith('Error')&&!d.availability.startsWith('Not')){
      calData=d.availability;
      document.getElementById('calDot').classList.add('live');
      document.getElementById('calText').classList.add('live');
      document.getElementById('calText').textContent='calendar connected';
    }else{
      document.getElementById('calText').textContent='calendar offline';
    }
  }catch(e){
    document.getElementById('calText').textContent='calendar offline';
  }
}

function renderStages(){
  document.getElementById('stageList').innerHTML=STAGES.map(s=>{
    let c='stage';if(s.id===stg)c+=' active';else if(s.id<stg)c+=' done';
    return`<div class="${c}"><div class="sn">${s.id}</div>${s.label}</div>`;
  }).join('');
  document.getElementById('stag').textContent=`stage ${stg} / ${STAGES[stg-1].label.toLowerCase()}`;
}

function renderHints(){
  const r=HINTS.filter(h=>Math.abs(h[1]-stg)<=1).slice(0,4);
  document.getElementById('hints').innerHTML='<span class="hl">try</span>'+r.map(h=>`<button class="hint" onclick="useHint('${h[0].replace(/'/g,"\\'")}')"> ${h[0]}</button>`).join('');
}

function useHint(t){document.getElementById('inp').value=t;go();}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}}

function addMsg(cls,text,anim=true){
  const el=document.getElementById('msgs');
  const d=document.createElement('div');d.className=cls;d.textContent=text;
  if(!anim)d.style.animation='none';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function addGap(){
  const el=document.getElementById('msgs');
  const d=document.createElement('div');d.className='gap';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function showTyper(){
  const el=document.getElementById('msgs');
  const d=document.createElement('div');d.className='typer';d.id='typer';
  d.innerHTML='<span></span><span></span><span></span>';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function killTyper(){const t=document.getElementById('typer');if(t)t.remove();}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function typingDelay(t){return Math.max(400,Math.min(t.length*55,1800));}

async function renderChunks(chunks){
  const el=document.getElementById('msgs');
  for(let i=0;i<chunks.length;i++){
    if(i>0){killTyper();showTyper();await delay(typingDelay(chunks[i]));killTyper();}
    const d=document.createElement('div');
    d.className='msg msg-me';d.textContent=chunks[i];
    el.appendChild(d);el.scrollTop=el.scrollHeight;
    await delay(60);
  }
  addGap();
}

function detectStage(t){
  const s=t.toLowerCase();
  if(s.includes('sending you')&&s.includes('link'))return 7;
  if(s.includes('what times')||s.includes('time zone')||s.includes('what works')||s.includes('available'))return 6;
  if(s.includes('strategy call')||s.includes('short call')||s.includes('you in'))return 5;
  if(s.includes('missing out'))return 4;
  if(s.includes('holding you back'))return 3;
  if(s.includes('end goal')||s.includes('goal for you'))return 2;
  return stg;
}

async function autoBook(bookData){
  try{
    const res=await fetch(BACKEND+'/book',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({leadName:lname,dateTime:bookData.dateTime,timezone:bookData.timezone||'America/Los_Angeles',durationMinutes:30,situation:bookData.situation||'strategy call',conversationId:convId})
    });
    const data=await res.json();
    if(data.success){
      bookedTotal++;
      document.getElementById('bookedCount').textContent=bookedTotal;
      const textNote=data.textSent?' + text sent':'';
      const errNote=data.twilioError?' (twilio: '+data.twilioError+')':'';
      addMsg('msg msg-booked','booked: '+lname+' at '+data.startFormatted+textNote+errNote);
    }else{
      addMsg('msg msg-sys','booking error: '+(data.error||'unknown'));
    }
  }catch(e){
    addMsg('msg msg-sys','auto-book failed: '+e.message);
  }
}

// ── DB tracking helpers ──
async function dbTrack(endpoint, body) {
  try {
    await fetch(BACKEND + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch(e) { console.warn('DB track failed:', e.message); }
}

async function ensureConversation() {
  if (convId) return;
  try {
    const r = await fetch(BACKEND + '/conversation/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ leadHandle: lname, platform: 'simulator' })
    });
    const d = await r.json();
    convId = d.conversationId;
    console.log('Conversation started:', convId);
  } catch(e) { console.warn('Conversation start failed:', e.message); }
}

async function go(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  const key=document.getElementById('apiKey').value.trim();
  if(!text||busy)return;
  if(!key){addMsg('msg msg-sys','paste your anthropic api key top right first',false);return;}

  const isDupe=text.trim().toLowerCase()===lastMsg&&text.length>3;
  lastMsg=text.trim().toLowerCase();

  inp.value='';inp.style.height='auto';
  busy=true;document.getElementById('sbtn').disabled=true;

  if(msgs.length===0){
    const w=text.split(' ')[0].replace(/[^a-zA-Z]/g,'');
    if(w.length>1&&w.length<13&&!['i','hey','hi','hello','sup','the','my','it','just'].includes(w.toLowerCase())){
      lname=w.charAt(0).toUpperCase()+w.slice(1);
    }
    document.getElementById('chName').textContent=lname;
    const av=document.getElementById('av');
    av.textContent=lname.charAt(0).toUpperCase();
    av.classList.add('live');
    await ensureConversation();
  }

  msgs.push({role:'user',content:text});
  addMsg('msg msg-them',text);
  addGap();showTyper();

  // Log lead message to DB
  if(convId) dbTrack('/conversation/message',{conversationId:convId,role:'lead',content:text,stage:STAGES[stg-1].label});

  const stgCtx=`\n\nCurrent stage: ${stg} / ${STAGES[stg-1].label}. Advance naturally.`;
  const dupeCtx=isDupe?`\n\nNOTE: Same message sent twice. Call it out lightly first.`:'';

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,system:buildSys()+stgCtx+dupeCtx,messages:msgs})
    });
    const data=await res.json();
    if(data.error){killTyper();addMsg('msg msg-sys','error: '+data.error.message);busy=false;document.getElementById('sbtn').disabled=false;return;}

    const rawReply=data.content?.[0]?.text||'...';
    killTyper();

    const bookMatch=rawReply.match(/\nBOOK:(\{[^}]+\})/);
    const visibleReply=rawReply.replace(/\nBOOK:\{[^}]+\}/,'').trim();

    msgs.push({role:'assistant',content:visibleReply});
    const chunks=visibleReply.split('|').map(s=>s.trim()).filter(Boolean);
    await renderChunks(chunks);

    // Log AI message to DB
    if(convId) dbTrack('/conversation/message',{conversationId:convId,role:'ian',content:visibleReply,stage:STAGES[stg-1].label});

    const ds=detectStage(visibleReply);
    if(ds>stg){
      // Log stage transition
      if(convId) dbTrack('/conversation/stage',{conversationId:convId,fromStage:STAGES[stg-1].label,toStage:STAGES[ds-1].label});
      stg=ds;
    }
    renderStages();renderHints();

    if(bookMatch){
      try{
        const bookData=JSON.parse(bookMatch[1]);
        await delay(500);
        await autoBook(bookData);
      }catch(e){
        console.error('Book parse error:',e,bookMatch[1]);
        addMsg('msg msg-sys','booking parse error');
      }
    }
  }catch(e){
    killTyper();addMsg('msg msg-sys','network error: '+e.message);
  }
  busy=false;document.getElementById('sbtn').disabled=false;
  document.getElementById('inp').focus();
}

function resetChat(){
  msgs=[];stg=1;lname='Lead';lastMsg='';convId=null;lastStg=1;
  document.getElementById('chName').textContent='Lead';
  const av=document.getElementById('av');av.textContent='?';av.classList.remove('live');
  document.getElementById('msgs').innerHTML='';
  addMsg('msg msg-sys','new conversation / type what the lead would say',false);
  renderStages();renderHints();
}

renderStages();renderHints();
addMsg('msg msg-sys','loading...','false');
loadData().then(()=>{
  document.getElementById('msgs').innerHTML='';
  addMsg('msg msg-sys','paste api key top right / type what the lead would say',false);
});
</script>
